app = "th-moi"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  META_GRAPH_VERSION = "v25.0"
  EVENT_NAME = "Workshop tri an khach hang"
  EVENT_DATE = "20/06/2026"
  EVENT_TIME = "18:30"
  EVENT_LOCATION = "Trung tam hoi nghi"
  EVENT_HOST = "Cong ty cua ban"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
